<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>工人證登記 Prototype</title>
    <link rel="icon" type="image/png" href="https://s3plus.meituan.net/nocode-external/assets/nocode-logo.png" />
    <link rel="apple-touch-icon" href="https://s3plus.meituan.net/nocode-external/assets/nocode-logo.png" />
    <link rel="shortcut icon" href="https://s3plus.meituan.net/nocode-external/assets/nocode-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="工人證登記" />
    <meta http-equiv="refresh" content="0; url=./www/app.html" />
    <style>
      :root {
        color-scheme: light;
        --bg: #eef4fb;
        --card: rgba(255, 255, 255, 0.88);
        --text: #172033;
        --muted: #667085;
        --primary: #3370ff;
        --accent: #14b8a6;
        --border: rgba(217, 226, 242, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, "SF Pro Display", "PingFang TC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(51, 112, 255, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.14), transparent 24%),
          linear-gradient(180deg, #f7f9fd 0%, var(--bg) 100%);
      }

      .card {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 14px;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), #1f5bdf);
        text-decoration: none;
        font-weight: 700;
      }

      .secondary {
        margin-left: 10px;
        color: var(--primary);
        background: #eef4ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>正在进入工人证登记原型</h1>
      <p>首页会自动跳转到 `www/app.html`。如果没有自动跳转，请使用下面的链接手动打开。</p>
      <a href="./www/app.html">打开主原型</a>
      <a class="secondary" href="./www/00-gallery-preview.html">打开总览页</a>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
